name: Validate Secrets (Dry Run)

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets are wired
        run: |
          echo "Checking required secrets..."

          if [ -z "$TAOSTATS_API_KEY" ]; then
            echo "FAIL: TAOSTATS_API_KEY is not set"
            exit 1
          else
            echo "OK: TAOSTATS_API_KEY is set (${#TAOSTATS_API_KEY} chars)"
          fi

          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "FAIL: NEXT_PUBLIC_SUPABASE_URL is not set"
            exit 1
          else
            echo "OK: NEXT_PUBLIC_SUPABASE_URL is set (${#NEXT_PUBLIC_SUPABASE_URL} chars)"
          fi

          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "FAIL: SUPABASE_SERVICE_ROLE_KEY is not set"
            exit 1
          else
            echo "OK: SUPABASE_SERVICE_ROLE_KEY is set (${#SUPABASE_SERVICE_ROLE_KEY} chars)"
          fi

          echo "All secrets wired correctly."
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
