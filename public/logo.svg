<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="16" fill="#080d14"/>

  <!-- τ (tau) symbol in purple -->
  <!-- Horizontal top bar -->
  <rect x="22" y="24" width="56" height="9" rx="4" fill="#a855f7"/>
  <!-- Vertical stem -->
  <rect x="45.5" y="24" width="9" height="52" rx="4" fill="#a855f7"/>

  <!-- Pulse / EKG line in white, running through middle of τ -->
  <polyline
    points="10,52 28,52 34,36 40,68 46,52 54,52 60,36 66,68 72,52 90,52"
    fill="none"
    stroke="white"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
