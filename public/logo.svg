<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="16" fill="#080d14"/>

  <!-- τ (tau) character in purple using text -->
  <text
    x="50"
    y="76"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="bold"
    fill="#a855f7"
  >τ</text>

  <!-- Pulse / EKG line in white, running through middle of τ -->
  <polyline
    points="5,52 20,52 26,38 32,66 38,52 62,52 68,38 74,66 80,52 95,52"
    fill="none"
    stroke="white"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
